<script>
  ;(function () {
    let accountID = '{{settings.accountID}}'
    let region = '{{settings.region}}'
    let rawPrefs = '{{settings.preferences}}'
    let preferences = {}

    if (!accountID || !region) {
      console.error(
        'Warning: Some values are not defined. Please configure them in the app admin.'
      )
      return
    }

    try {
      preferences = JSON.parse(decodeURIComponent(rawPrefs))
    } catch (e) {
      console.error('Failed to parse preferences:', e)
      return
    }

    const { allowUnknownUsersEvents, trackEvents } = preferences

    const clevertapConfigs = {
      accountID,
      region,
      isLogged: false,
      privacy: { optOut: false, useIP: false },
      spa: true,
      preferences: {
        allowUnknownUsersEvents,
        trackEvents,
      },
    }

    try {
      localStorage.setItem('clevertapConfigs', JSON.stringify(clevertapConfigs))
    } catch (e) {
      console.error('CleverTap: failed to save config to localStorage', e)
    }
  })()
</script>
