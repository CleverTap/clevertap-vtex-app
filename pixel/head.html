<script>
  ;(function () {
    var accountID = '{{settings.accountID}}'
    var region = '{{settings.region}}'

    if (!accountID || !region) {
      console.error(
        'Warning: Some values are not defined. Please configure them in the app admin.'
      )
      return
    }

    window.clevertap = window.clevertap || {
      event: [],
      profile: [],
      account: [],
      onUserLogin: [],
      notifications: [],
      privacy: [],
    }

    window.clevertap.account.push({ id: accountID }, region)
    window.clevertap.privacy.push({ optOut: false })
    window.clevertap.privacy.push({ useIP: false })

    var wzrk = document.createElement('script')
    wzrk.type = 'text/javascript'
    wzrk.async = true
    wzrk.src =
      ('https:' == document.location.protocol
        ? 'https://d2r1yp2w7bby2u.cloudfront.net'
        : 'http://static.clevertap.com') + '/js/clevertap.min.js'
    var s = document.getElementsByTagName('script')[0]
    s.parentNode.insertBefore(wzrk, s)
  })()
</script>
