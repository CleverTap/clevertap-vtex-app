<script>
  ;(function () {
    let accountID = '{{settings.accountID}}'
    let region = '{{settings.region}}'

    if (!accountID || !region) {
      console.error(
        'Warning: Some values are not defined. Please configure them in the app admin.'
      )
      return
    }

    const clevertapConfigs = {
      accountID: accountID,
      region: region,
      privacy: { optOut: false, useIP: false },
      spa: true,
    }

    try {
      localStorage.setItem('clevertapConfigs', JSON.stringify(clevertapConfigs))
    } catch (e) {
      console.error('CleverTap: failed to save config to localStorage', e)
    }
  })()
</script>
