<script>
  ;(function () {
    let accountID = '{{settings.accountID}}'
    let region = '{{settings.region}}'
    let rawPrefs = '{{settings.preferences}}'
    let preferences = {}

    if (!accountID || !region) {
      console.error(
        'Warning: Some values are not defined. Please configure them in the app admin.'
      )
      return
    }

    try {
      preferences = JSON.parse(decodeURIComponent(rawPrefs))
    } catch (e) {
      console.error('Failed to parse preferences:', e)
      return
    }

    const {
      allowUnknownUsersEvents,
      trackEvents,
      useChargeEventOnlyWhenOrderApproved,
    } = preferences

    let isLogged = false
    try {
      const saved = localStorage.getItem('clevertapConfigs')
      if (saved) {
        const prev = JSON.parse(saved)
        if (prev && typeof prev.isLogged === 'boolean') {
          isLogged = prev.isLogged
        }
      }
    } catch (e) {
      // ignore invalid or missing storage
    }

    const clevertapConfigs = {
      accountID,
      region,
      isLogged,
      privacy: { optOut: false, useIP: true },
      spa: true,
      preferences: {
        allowUnknownUsersEvents,
        trackEvents,
        useChargeEventOnlyWhenOrderApproved,
      },
    }

    try {
      localStorage.setItem('clevertapConfigs', JSON.stringify(clevertapConfigs))
    } catch (e) {
      console.error('CleverTap: failed to save config to localStorage', e)
    }
  })()
</script>
